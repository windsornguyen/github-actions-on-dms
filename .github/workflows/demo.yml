name: Demo on Dedalus Machine

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  hello-from-dm:
    runs-on: [self-hosted, dedalus]
    steps:
      - uses: actions/checkout@v4
      - name: Prove this ran on a Dedalus Machine
        run: |
          echo "host: $(hostname)"
          uname -a
          cat /etc/os-release
          mount | grep dedalusfs
